services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-postgres
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U delivery -d delivery
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    image: node:20-alpine
    container_name: delivery-gateway
    working_dir: /app
    command:
      - node
      - server.js
    environment:
      PORT: 8081
    volumes:
      - ./infra/gateway:/app:ro
    ports:
      - "8081:8081"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8081/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    container_name: delivery-toxiproxy
    command:
      - -host=0.0.0.0
      - -config=/config/toxiproxy.json
    ports:
      - "8474:8474"
      - "8666:8666"
    volumes:
      - ./infra/toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro
    depends_on:
      gateway:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-app
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://delivery:delivery@postgres:5432/delivery
      REDIS_URL: redis://redis:6379
      GATEWAY_URL: http://toxiproxy:8666
      GATEWAY_TIMEOUT_MS: 2000
      GATEWAY_MAX_TENTATIVAS: 4
      GATEWAY_RETRY_MS: 500
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      toxiproxy:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data: